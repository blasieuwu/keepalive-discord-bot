name: lint bot.py code

# make it so that it runs on every change to the `main` branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-linter:
    runs-on: macos-latest

    steps:
    # 1. check repo
    - name: checkout repository
      uses: actions/checkout@v4

    # 2. setup python
    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. get dependencies
    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. do the actual linting
    - name: run linter
      run: ruff check .
